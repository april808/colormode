<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>預覽模板（最初 A 模型）</title>
  <style>
    :root {
      --v-theme-primary: 92, 75, 140;      /* #5C4B8C 主色（紫） */
      --v-theme-on-surface: 40, 42, 54;    /* 文字 */
      --v-theme-surface: 240, 241, 243;    /* 卡片底（淺灰） */
    }
    body { margin: 24px; background: #eef1f5; font-family: system-ui, "Noto Sans TC", sans-serif; }
    h1 { font-size: 14px; color: #555; font-weight: 500; }

    /* ── A 模型預覽外框 ── */
    .a_preview {
      position: relative; width: 100%; max-width: 520px; aspect-ratio: 16 / 10;
      border-radius: 6px; overflow: hidden;
      background-color: rgb(var(--v-theme-surface));
    }

    /* 右側大寫 A（浮水印） */
    .a_preview .a_letter {
      position: absolute; right: 8%; bottom: -14%;
      font-size: 15rem; font-weight: 700; line-height: 1;
      color: rgba(var(--v-theme-primary), 0.42);
      pointer-events: none; user-select: none;
    }
    /* A 旁的直條 */
    .a_preview .a_bar {
      position: absolute; top: 0; right: 20%;
      width: 16px; height: 60%;
      background-color: rgba(var(--v-theme-primary), 0.55);
    }

    /* 左側內容 */
    .a_preview .a_content {
      position: absolute; inset: 0; padding: 7% 8%;
      display: flex; flex-direction: column; z-index: 1;
    }
    .a_preview .a_square {
      width: 36px; height: 36px; border-radius: 3px;
      background-color: rgba(var(--v-theme-primary), 0.42);
    }
    .a_preview .a_title {
      margin-top: 14px; font-size: 1.5rem; font-weight: 700; line-height: 1.2;
      color: rgb(var(--v-theme-primary));
    }
    .a_preview .a_subtitle {
      font-size: 0.95rem; line-height: 1.4;
      color: rgba(var(--v-theme-on-surface), 0.45);
    }
    .a_preview .a_line {
      display: block; height: 6px; margin-top: 8px; border-radius: 2px;
      background-color: rgba(var(--v-theme-primary), 0.30);
    }
    .a_preview .a_blocks { display: flex; gap: 10px; margin-top: 12px; }
    .a_preview .a_block {
      width: 44px; height: 12px; border-radius: 2px;
      background-color: rgba(var(--v-theme-primary), 0.55);
    }
  </style>
</head>
<body>
  <h1>預覽模板（最初 A 模型）— 標題/副標題文字 + 大寫 A 浮水印 + 直條</h1>
  <div class="a_preview">
    <span class="a_letter">A</span>
    <span class="a_bar"></span>
    <div class="a_content">
      <span class="a_square"></span>
      <p class="a_title">標題文字</p>
      <p class="a_subtitle">副標題文字</p>
      <span class="a_line" style="width: 62%"></span>
      <span class="a_line" style="width: 62%"></span>
      <span class="a_line" style="width: 62%"></span>
      <span class="a_line" style="width: 62%"></span>
      <div class="a_blocks">
        <span class="a_block"></span>
        <span class="a_block"></span>
      </div>
    </div>
  </div>
</body>
</html>
